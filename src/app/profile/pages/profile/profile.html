<div class="profile-page">
  <div class="page-header">
    <h1>{{ 'PROFILE.TITLE' | translate }}</h1>
    <p class="subtitle">{{ 'PROFILE.DESCRIPTION' | translate }}</p>
  </div>

  @if (showSuccessBanner) {
    <div class="success-banner">{{ 'PROFILE.SAVE_SUCCESS' | translate }}</div>
  }

  <div class="profile-layout">
    <div class="avatar-panel">
      <img [src]="avatarUrl" alt="Profile photo" class="avatar" />
      <input
        #fileInput
        type="file"
        accept="image/*"
        class="hidden-input"
        (change)="onFileSelected($event)"
      />
      <button class="btn-dark" (click)="changePhoto()">{{ 'PROFILE.CHANGE_PHOTO' | translate }}</button>
    </div>

    <div class="form-panel">
      <h2>Personal details</h2>
      <div class="form-row">
        <label>
          {{ 'PROFILE.FIRST_NAME' | translate }}
          <input type="text" [(ngModel)]="firstName" [placeholder]="'PROFILE.FIRST_NAME' | translate" />
        </label>
        <label>
          {{ 'PROFILE.LAST_NAME' | translate }}
          <input type="text" [(ngModel)]="lastName" [placeholder]="'PROFILE.LAST_NAME' | translate" />
        </label>
      </div>

      <h2>Contact information</h2>
      <div class="form-row">
        <label>
          {{ 'PROFILE.PHONE' | translate }}
          <input type="tel" [(ngModel)]="phone" placeholder="+1 999 999 9999" />
        </label>
        <label>
          {{ 'PROFILE.EMAIL' | translate }}
          <input type="email" [(ngModel)]="email" placeholder="email@domain.com" />
        </label>
      </div>

      <h2>{{ 'PROFILE.TYPE' | translate }}</h2>
      <div class="form-row">
        <label>
          {{ 'PROFILE.TYPE' | translate }}
          <select [(ngModel)]="profileType" class="profile-type-select">
            <option value="UNDEFINED">{{ 'PROFILE.TYPE_UNDEFINED' | translate }}</option>
            <option value="STANDARD">{{ 'PROFILE.TYPE_STANDARD' | translate }}</option>
            <option value="CORPORATE">{{ 'PROFILE.TYPE_CORPORATE' | translate }}</option>
          </select>
        </label>
      </div>

      <button class="btn-save" (click)="save()">{{ 'PROFILE.SAVE' | translate }}</button>
    </div>
  </div>
</div>
