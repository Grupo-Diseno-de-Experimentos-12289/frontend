<div *ngIf="isLoading" class="loading">Loading reviews...</div>

<div *ngIf="!isLoading && reviews.length === 0" class="empty">
  <p>No reviews yet for this experience.</p>
</div>

<div *ngIf="!isLoading && reviews.length > 0" class="review-grid">
  <div class="review-card" *ngFor="let review of reviews">
    <div class="review-header">
      <span class="reviewer-name">Traveler #{{ review.userId }}</span>
      <span class="rating">⭐⭐⭐⭐⭐ {{ review.rating }}/5</span>
    </div>
    <span class="date">{{ review.createdAt | date: 'longDate' }}</span>
    <p class="comment">&ldquo;{{ review.comment }}&rdquo;</p>
  </div>
</div>
